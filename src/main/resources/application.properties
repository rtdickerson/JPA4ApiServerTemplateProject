# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:itemdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate (Jakarta Persistence 3.x / Hibernate 6.x) ──────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── H2 Web Console (dev only) ────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── GraphQL ──────────────────────────────────────────────────────────────────
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# ── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANT: replace with a 256-bit (32+ char) secret before deploying
jwt.secret=change-me-to-a-256-bit-secret-before-production-use!!
jwt.expiration-ms=86400000

# ── MCP ──────────────────────────────────────────────────────────────────────
# SSE endpoint: GET  http://localhost:8080/mcp/sse
# Message endpoint: POST http://localhost:8080/mcp/message

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.example=DEBUG
logging.level.org.springframework.security=WARN
